name: Deploy map to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi necessari per pubblicare su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta: i push orari non si accavallano più
# (elimina i "Deployment failed, try again later" da deploy sovrapposti)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepara il sito (solo la mappa)
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/index.html
          touch _site/.nojekyll

      - name: Carica artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
